<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <style>
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes pulseNode {
        0%, 100% { filter: drop-shadow(0 0 6px var(--c)) drop-shadow(0 0 15px var(--c)); transform: scale(1); }
        50% { filter: drop-shadow(0 0 3px var(--c)) drop-shadow(0 0 8px var(--c)); transform: scale(0.97); }
      }
      @keyframes arrowFlow {
        0% { stroke-dashoffset: 30; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes glowPulse1 {
        0%, 100% { filter: drop-shadow(0 0 8px #ff2079) drop-shadow(0 0 20px #ff207960); }
        50% { filter: drop-shadow(0 0 4px #ff2079) drop-shadow(0 0 10px #ff207930); }
      }
      @keyframes glowPulse2 {
        0%, 100% { filter: drop-shadow(0 0 8px #00fff1) drop-shadow(0 0 20px #00fff160); }
        50% { filter: drop-shadow(0 0 4px #00fff1) drop-shadow(0 0 10px #00fff130); }
      }
      @keyframes glowPulse3 {
        0%, 100% { filter: drop-shadow(0 0 8px #f5f720) drop-shadow(0 0 20px #f5f72060); }
        50% { filter: drop-shadow(0 0 4px #f5f720) drop-shadow(0 0 10px #f5f72030); }
      }
      @keyframes floatUp {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      @keyframes slideUp {
        0% { transform: translateY(15px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      @keyframes dashMove {
        0% { stroke-dashoffset: 60; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes dotTravel {
        0% { opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { opacity: 0; }
      }

      .bg { fill: #0a0014; }
      .card { fill: #0d001a; stroke: #1a0035; stroke-width: 1; rx: 12; }

      /* Node boxes */
      .node-box {
        rx: 10;
        stroke-width: 2;
      }
      .node-now { fill: #0d001a; stroke: #ff2079; animation: glowPulse1 3s ease-in-out infinite; }
      .node-mid { fill: #0d001a; stroke: #00fff1; animation: glowPulse2 3s ease-in-out infinite 1s; }
      .node-long { fill: #0d001a; stroke: #f5f720; animation: glowPulse3 3s ease-in-out infinite 2s; }

      /* Labels */
      .phase-label {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 10px;
        font-weight: bold;
        text-anchor: middle;
        letter-spacing: 2px;
      }
      .phase-now { fill: #ff2079; }
      .phase-mid { fill: #00fff1; }
      .phase-long { fill: #f5f720; }
      .role-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 18px;
        font-weight: bold;
        fill: #ffffff;
        text-anchor: middle;
      }
      .role-sub {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 10px;
        fill: #9b5de5;
        text-anchor: middle;
      }
      .icon-text {
        font-family: 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif;
        font-size: 24px;
        text-anchor: middle;
        dominant-baseline: central;
      }

      /* Arrows */
      .arrow-line {
        stroke-width: 2;
        fill: none;
        stroke-dasharray: 8,4;
        animation: dashMove 2s linear infinite;
      }
      .arrow-1 { stroke: #ff2079; }
      .arrow-2 { stroke: #00fff1; }
      .arrow-head {
        stroke-width: 2;
        fill: none;
      }

      /* Bottom items */
      .item-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 10px;
        fill: #9b5de5;
        text-anchor: middle;
      }
      .item-icon {
        font-family: 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif;
        font-size: 14px;
        text-anchor: middle;
      }
      .item-label {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 9px;
        fill: #e0d0ff;
        text-anchor: middle;
      }

      /* Floating icons */
      .float-1 { animation: floatUp 4s ease-in-out infinite; }
      .float-2 { animation: floatUp 4s ease-in-out infinite 1.3s; }
      .float-3 { animation: floatUp 4s ease-in-out infinite 2.6s; }

      .item-g1 { animation: slideUp 0.6s ease-out 1.2s both; }
      .item-g2 { animation: slideUp 0.6s ease-out 1.4s both; }
      .item-g3 { animation: slideUp 0.6s ease-out 1.6s both; }
      .item-g4 { animation: slideUp 0.6s ease-out 1.8s both; }
      .item-g5 { animation: slideUp 0.6s ease-out 2.0s both; }

      .corner { stroke-width: 1.5; fill: none; }
    </style>
    <linearGradient id="arrowGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2079"/>
      <stop offset="100%" stop-color="#00fff1"/>
    </linearGradient>
    <linearGradient id="arrowGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00fff1"/>
      <stop offset="100%" stop-color="#f5f720"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" class="bg"/>
  <rect x="20" y="10" width="860" height="280" class="card"/>

  <!-- Corner accents -->
  <polyline points="20,30 20,10 40,10" class="corner" stroke="#ff2079"/>
  <polyline points="860,280 880,280 880,260" class="corner" stroke="#00fff1"/>

  <!-- ========== NOW NODE ========== -->
  <g class="float-1">
    <rect x="70" y="40" width="180" height="120" class="node-box node-now"/>
    <text x="160" y="30" class="phase-label phase-now">▼ NOW</text>
    <text x="160" y="78" class="icon-text">⚙️</text>
    <text x="160" y="108" class="role-text">Engineer</text>
    <text x="160" y="128" class="role-sub">Build real</text>
    <text x="160" y="142" class="role-sub">systems</text>
  </g>

  <!-- Arrow 1: NOW → MID -->
  <line x1="260" y1="100" x2="340" y2="100" class="arrow-line arrow-1"/>
  <polyline points="332,94 342,100 332,106" stroke="#ff2079" class="arrow-head"/>

  <!-- ========== MID-TERM NODE ========== -->
  <g class="float-2">
    <rect x="350" y="40" width="180" height="120" class="node-box node-mid"/>
    <text x="440" y="30" class="phase-label phase-mid">▼ MID-TERM</text>
    <text x="440" y="78" class="icon-text">🏗️</text>
    <text x="440" y="108" class="role-text">Architect</text>
    <text x="440" y="128" class="role-sub">Design how</text>
    <text x="440" y="142" class="role-sub">systems work</text>
  </g>

  <!-- Arrow 2: MID → LONG -->
  <line x1="540" y1="100" x2="620" y2="100" class="arrow-line arrow-2"/>
  <polyline points="612,94 622,100 612,106" stroke="#00fff1" class="arrow-head"/>

  <!-- ========== LONG-TERM NODE ========== -->
  <g class="float-3">
    <rect x="630" y="40" width="200" height="120" class="node-box node-long"/>
    <text x="730" y="30" class="phase-label phase-long">▼ LONG-TERM</text>
    <text x="730" y="78" class="icon-text">🚀</text>
    <text x="730" y="108" class="role-text">Founder</text>
    <text x="730" y="128" class="role-sub">Products +</text>
    <text x="730" y="142" class="role-sub">Capital + Invest</text>
  </g>

  <!-- ========== BOTTOM ITEMS ========== -->
  <line x1="60" y1="185" x2="840" y2="185" stroke="#1a0035" stroke-width="0.5" stroke-dasharray="3,3"/>

  <g class="item-g1">
    <circle cx="120" cy="215" r="18" fill="none" stroke="#ff207950" stroke-width="1"/>
    <text x="120" y="215" class="item-icon">🏛️</text>
    <text x="120" y="242" class="item-text">Architecture</text>
    <text x="120" y="255" class="item-label">Design systems,</text>
    <text x="120" y="266" class="item-label">not just features</text>
  </g>

  <g class="item-g2">
    <circle cx="280" cy="215" r="18" fill="none" stroke="#00fff150" stroke-width="1"/>
    <text x="280" y="215" class="item-icon">📦</text>
    <text x="280" y="242" class="item-text">SaaS Products</text>
    <text x="280" y="255" class="item-label">Cosmos Algos →</text>
    <text x="280" y="266" class="item-label">product-led</text>
  </g>

  <g class="item-g3">
    <circle cx="440" cy="215" r="18" fill="none" stroke="#9b5de550" stroke-width="1"/>
    <text x="440" y="215" class="item-icon">🤖</text>
    <text x="440" y="242" class="item-text">AI Integration</text>
    <text x="440" y="255" class="item-label">ML in real IoT</text>
    <text x="440" y="266" class="item-label">and SaaS systems</text>
  </g>

  <g class="item-g4">
    <circle cx="600" cy="215" r="18" fill="none" stroke="#f5f72050" stroke-width="1"/>
    <text x="600" y="215" class="item-icon">💰</text>
    <text x="600" y="242" class="item-text">Angel Investing</text>
    <text x="600" y="255" class="item-label">Early-stage</text>
    <text x="600" y="266" class="item-label">technical founders</text>
  </g>

  <g class="item-g5">
    <circle cx="770" cy="215" r="18" fill="none" stroke="#00ff4150" stroke-width="1"/>
    <text x="770" y="215" class="item-icon">⭐</text>
    <text x="770" y="242" class="item-text">Personal Brand</text>
    <text x="770" y="255" class="item-label">Built on real</text>
    <text x="770" y="266" class="item-label">work, not hype</text>
  </g>
</svg>
