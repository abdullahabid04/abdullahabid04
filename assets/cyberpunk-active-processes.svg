<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <defs>
    <style>
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes pulseGlow {
        0%, 100% { filter: drop-shadow(0 0 4px #ff2079) drop-shadow(0 0 10px #ff207960); }
        50% { filter: drop-shadow(0 0 2px #ff2079) drop-shadow(0 0 5px #ff207930); }
      }
      @keyframes cyanGlow {
        0%, 100% { filter: drop-shadow(0 0 3px #00fff1) drop-shadow(0 0 8px #00fff160); }
        50% { filter: drop-shadow(0 0 1px #00fff1) drop-shadow(0 0 4px #00fff130); }
      }
      @keyframes nodeFlicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
        20%, 24%, 55% { opacity: 0.5; }
      }
      @keyframes scanPulse {
        0% { stroke-dashoffset: 20; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes barGrow1 { 0% { width: 0; } 100% { width: 100%; } }
      @keyframes progressFill {
        0% { stroke-dashoffset: 500; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes dotBlink {
        0%, 100% { fill-opacity: 1; }
        50% { fill-opacity: 0.3; }
      }
      @keyframes slideInLeft {
        0% { transform: translateX(-20px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        0% { transform: translateX(20px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }

      .bg { fill: #0a0014; }
      .card-bg {
        fill: #0d001a;
        stroke: #1a0035;
        stroke-width: 1;
        rx: 8;
      }
      .row-bg-alt {
        fill: #0f001f;
        rx: 6;
      }
      .row-bg {
        fill: #0a0014;
        rx: 6;
      }
      .icon-circle {
        r: 16;
        stroke-width: 2;
        fill: none;
      }
      .icon-text {
        font-family: 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif;
        font-size: 16px;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .label-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 13px;
        font-weight: bold;
        fill: #00fff1;
      }
      .arrow-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 14px;
        fill: #ff2079;
        animation: pulseGlow 3s ease-in-out infinite;
      }
      .value-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 12px;
        fill: #e0d0ff;
      }
      .separator {
        stroke: #2a0050;
        stroke-width: 0.5;
        stroke-dasharray: 4,4;
      }
      .progress-bar-bg {
        fill: #1a0030;
        rx: 3;
        height: 6;
      }
      .progress-bar-fill {
        rx: 3;
        height: 6;
      }
      .status-dot {
        r: 4;
        animation: dotBlink 2s ease-in-out infinite;
      }
      .status-active { fill: #00ff41; }
      .status-building { fill: #ff2079; }
      .status-exploring { fill: #f5f720; }
      .corner { stroke-width: 1.5; fill: none; }
      .corner-tl { stroke: #ff2079; }
      .corner-br { stroke: #00fff1; }
      .title-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 11px;
        fill: #9b5de580;
        text-anchor: middle;
      }

      .row-1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
      .row-2 { animation: slideInRight 0.8s ease-out 0.4s both; }
      .row-3 { animation: slideInLeft 0.8s ease-out 0.6s both; }
      .row-4 { animation: slideInRight 0.8s ease-out 0.8s both; }
      .row-5 { animation: slideInLeft 0.8s ease-out 1.0s both; }
    </style>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2079"/>
      <stop offset="100%" stop-color="#9b5de5"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00fff1"/>
      <stop offset="100%" stop-color="#9b5de5"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5f720"/>
      <stop offset="100%" stop-color="#ff2079"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00fff1"/>
      <stop offset="100%" stop-color="#00ff41"/>
    </linearGradient>
    <linearGradient id="grad5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2079"/>
      <stop offset="100%" stop-color="#00fff1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" class="bg"/>
  
  <!-- Main card -->
  <rect x="20" y="15" width="860" height="310" class="card-bg"/>
  
  <!-- Corner accents -->
  <polyline points="20,35 20,15 40,15" class="corner corner-tl"/>
  <polyline points="860,310 880,310 880,290" class="corner corner-br" style="animation: cyanGlow 3s ease-in-out infinite;"/>

  <!-- Title bar -->
  <text x="450" y="38" class="title-text">// CURRENT_SYSTEM_PROCESSES</text>
  <line x1="60" y1="48" x2="840" y2="48" stroke="#1a0035" stroke-width="0.5"/>

  <!-- Row 1: Building -->
  <g class="row-1">
    <rect x="40" y="58" width="820" height="46" class="row-bg-alt"/>
    <circle cx="72" cy="81" class="icon-circle" stroke="#ff2079" style="animation: pulseGlow 3s ease-in-out infinite;"/>
    <text x="72" y="81" class="icon-text">🔭</text>
    <text x="100" y="75" class="label-text">BUILDING</text>
    <text x="100" y="92" class="value-text">Desktop Automation Software (C#)</text>
    <circle cx="810" cy="81" class="status-dot status-building"/>
    <rect x="600" y="78" width="180" height="6" class="progress-bar-bg"/>
    <rect x="600" y="78" width="140" height="6" class="progress-bar-fill" fill="url(#grad1)"/>
    <text x="790" y="85" font-family="'Courier New', monospace" font-size="9" fill="#ff207990" text-anchor="end">78%</text>
  </g>

  <!-- Row 2: Studying -->
  <g class="row-2">
    <rect x="40" y="110" width="820" height="46" class="row-bg"/>
    <circle cx="72" cy="133" class="icon-circle" stroke="#00fff1" style="animation: cyanGlow 3s ease-in-out infinite;"/>
    <text x="72" y="133" class="icon-text">📚</text>
    <text x="100" y="127" class="label-text">STUDYING</text>
    <text x="100" y="144" class="value-text">BSc AI @ IUB · Advanced IoT architectures</text>
    <circle cx="810" cy="133" class="status-dot status-active"/>
    <rect x="600" y="130" width="180" height="6" class="progress-bar-bg"/>
    <rect x="600" y="130" width="110" height="6" class="progress-bar-fill" fill="url(#grad2)"/>
    <text x="790" y="137" font-family="'Courier New', monospace" font-size="9" fill="#00fff190" text-anchor="end">61%</text>
  </g>

  <!-- Row 3: Exploring -->
  <g class="row-3">
    <rect x="40" y="162" width="820" height="46" class="row-bg-alt"/>
    <circle cx="72" cy="185" class="icon-circle" stroke="#f5f720" style="filter: drop-shadow(0 0 3px #f5f720);"/>
    <text x="72" y="185" class="icon-text">🌱</text>
    <text x="100" y="179" class="label-text">EXPLORING</text>
    <text x="100" y="196" class="value-text">AI/ML in SaaS · Scalable cloud infra</text>
    <circle cx="810" cy="185" class="status-dot status-exploring"/>
    <rect x="600" y="182" width="180" height="6" class="progress-bar-bg"/>
    <rect x="600" y="182" width="80" height="6" class="progress-bar-fill" fill="url(#grad3)"/>
    <text x="790" y="189" font-family="'Courier New', monospace" font-size="9" fill="#f5f72090" text-anchor="end">44%</text>
  </g>

  <!-- Row 4: Seeking -->
  <g class="row-4">
    <rect x="40" y="214" width="820" height="46" class="row-bg"/>
    <circle cx="72" cy="237" class="icon-circle" stroke="#00fff1" style="animation: cyanGlow 4s ease-in-out infinite;"/>
    <text x="72" y="237" class="icon-text">💼</text>
    <text x="100" y="231" class="label-text">SEEKING</text>
    <text x="100" y="248" class="value-text">Remote Backend Engineering and Software Engineering roles</text>
    <circle cx="810" cy="237" class="status-dot status-active"/>
    <rect x="600" y="234" width="180" height="6" class="progress-bar-bg"/>
    <rect x="600" y="234" width="165" height="6" class="progress-bar-fill" fill="url(#grad4)"/>
    <text x="790" y="241" font-family="'Courier New', monospace" font-size="9" fill="#00ff4190" text-anchor="end">92%</text>
  </g>

  <!-- Row 5: Startup -->
  <g class="row-5">
    <rect x="40" y="266" width="820" height="46" class="row-bg-alt"/>
    <circle cx="72" cy="289" class="icon-circle" stroke="#ff2079" style="animation: pulseGlow 4s ease-in-out infinite;"/>
    <text x="72" y="289" class="icon-text">🚀</text>
    <text x="100" y="283" class="label-text">BUILDING</text>
    <text x="100" y="300" class="value-text">Cosmos Algos as a product-led startup</text>
    <circle cx="810" cy="289" class="status-dot status-building"/>
    <rect x="600" y="286" width="180" height="6" class="progress-bar-bg"/>
    <rect x="600" y="286" width="100" height="6" class="progress-bar-fill" fill="url(#grad5)"/>
    <text x="790" y="293" font-family="'Courier New', monospace" font-size="9" fill="#ff207990" text-anchor="end">56%</text>
  </g>
</svg>
