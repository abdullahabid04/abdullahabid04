<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <style>
      @keyframes neonPulseBlue {
        0%, 100% { filter: drop-shadow(0 0 3px #00fff1) drop-shadow(0 0 8px #00fff150); }
        50% { filter: drop-shadow(0 0 1px #00fff1) drop-shadow(0 0 4px #00fff120); }
      }
      @keyframes neonPulsePink {
        0%, 100% { filter: drop-shadow(0 0 3px #ff2079) drop-shadow(0 0 8px #ff207950); }
        50% { filter: drop-shadow(0 0 1px #ff2079) drop-shadow(0 0 4px #ff207920); }
      }
      @keyframes neonPulseYellow {
        0%, 100% { filter: drop-shadow(0 0 3px #f5f720) drop-shadow(0 0 8px #f5f72050); }
        50% { filter: drop-shadow(0 0 1px #f5f720) drop-shadow(0 0 4px #f5f72020); }
      }
      @keyframes slideInUp {
        0% { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }

      .bg { fill: #0a0014; }
      
      .card {
        fill: #0d001a;
        stroke: #1a0035;
        stroke-width: 1.5;
        rx: 6;
      }

      .box-blue { stroke: #00fff180; fill: #00fff10a; animation: neonPulseBlue 3s infinite; }
      .box-pink { stroke: #ff207980; fill: #ff20790a; animation: neonPulsePink 3s infinite 1s; }
      .box-yellow { stroke: #f5f72080; fill: #f5f7200a; animation: neonPulseYellow 3s infinite 2s; }
      
      .title-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 13px;
        font-weight: bold;
        text-anchor: start;
        dominant-baseline: middle;
      }
      
      .desc-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 12px;
        fill: #e0d0ff;
        text-anchor: start;
      }

      .icon-text {
        font-family: 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif;
        font-size: 20px;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      
      .anim-1 { animation: slideInUp 0.5s ease-out 0.1s both; }
      .anim-2 { animation: slideInUp 0.5s ease-out 0.2s both; }
      .anim-3 { animation: slideInUp 0.5s ease-out 0.3s both; }
      .anim-4 { animation: slideInUp 0.5s ease-out 0.4s both; }
      .anim-5 { animation: slideInUp 0.5s ease-out 0.5s both; }
      .anim-6 { animation: slideInUp 0.5s ease-out 0.6s both; }
      
      .accent-line {
        stroke-width: 2;
        fill: none;
      }
    </style>
  </defs>

  <rect width="900" height="400" class="bg" />

  <!-- Principle 1 -->
  <g transform="translate(20, 20)">
    <g class="anim-1">
      <rect width="420" height="100" class="card box-pink" />
      <path d="M 0 10 L 0 6 L 6 0 L 10 0" class="accent-line" stroke="#ff2079" />
      <text x="40" y="50" class="icon-text">🔨</text>
      <text x="75" y="35" class="title-text" fill="#ff2079">How I learn</text>
      <text x="75" y="65" class="desc-text">Hands-on first. Build before reading.</text>
    </g>
  </g>

  <!-- Principle 2 -->
  <g transform="translate(460, 20)">
    <g class="anim-2">
      <rect width="420" height="100" class="card box-blue" />
      <path d="M 0 10 L 0 6 L 6 0 L 10 0" class="accent-line" stroke="#00fff1" />
      <text x="40" y="50" class="icon-text">🧩</text>
      <text x="75" y="35" class="title-text" fill="#00fff1">How I solve problems</text>
      <text x="75" y="65" class="desc-text">Trace the full system — firmware to mobile.</text>
    </g>
  </g>

  <!-- Principle 3 -->
  <g transform="translate(20, 140)">
    <g class="anim-3">
      <rect width="420" height="100" class="card box-yellow" />
      <path d="M 0 10 L 0 6 L 6 0 L 10 0" class="accent-line" stroke="#f5f720" />
      <text x="40" y="50" class="icon-text">🔁</text>
      <text x="75" y="35" class="title-text" fill="#f5f720">How I build</text>
      <text x="75" y="65" class="desc-text">Ship a working version. Iterate. Improve.</text>
    </g>
  </g>

  <!-- Principle 4 -->
  <g transform="translate(460, 140)">
    <g class="anim-4">
      <rect width="420" height="100" class="card box-pink" />
      <path d="M 0 10 L 0 6 L 6 0 L 10 0" class="accent-line" stroke="#ff2079" />
      <text x="40" y="50" class="icon-text">📄</text>
      <text x="75" y="35" class="title-text" fill="#ff2079">How I document</text>
      <text x="75" y="65" class="desc-text">Every API gets a Postman coll + OpenAPI spec.</text>
    </g>
  </g>

  <!-- Principle 5 -->
  <g transform="translate(20, 260)">
    <g class="anim-5">
      <rect width="420" height="100" class="card box-blue" />
      <path d="M 0 10 L 0 6 L 6 0 L 10 0" class="accent-line" stroke="#00fff1" />
      <text x="40" y="50" class="icon-text">🤝</text>
      <text x="75" y="35" class="title-text" fill="#00fff1">How I collaborate</text>
      <text x="75" y="65" class="desc-text">Contributor, not over-claimer. Team systems.</text>
    </g>
  </g>

  <!-- Principle 6 -->
  <g transform="translate(460, 260)">
    <g class="anim-6">
      <rect width="420" height="100" class="card box-yellow" />
      <path d="M 0 10 L 0 6 L 6 0 L 10 0" class="accent-line" stroke="#f5f720" />
      <text x="40" y="50" class="icon-text">⚖️</text>
      <text x="75" y="35" class="title-text" fill="#f5f720">What I value</text>
      <text x="75" y="65" class="desc-text">Working systems > perfect code. Clarity > clever.</text>
    </g>
  </g>

</svg>
