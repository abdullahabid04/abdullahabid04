<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <style>
      @keyframes slideIn {
        0% { transform: translateX(-10px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes pulseG1 { 0%, 100% { filter: drop-shadow(0 0 5px #ff2079); } 50% { filter: drop-shadow(0 0 2px #ff2079); } }
      @keyframes pulseG2 { 0%, 100% { filter: drop-shadow(0 0 5px #00fff1); } 50% { filter: drop-shadow(0 0 2px #00fff1); } }
      @keyframes pulseG3 { 0%, 100% { filter: drop-shadow(0 0 5px #f5f720); } 50% { filter: drop-shadow(0 0 2px #f5f720); } }
      @keyframes pulseG4 { 0%, 100% { filter: drop-shadow(0 0 5px #00ff41); } 50% { filter: drop-shadow(0 0 2px #00ff41); } }
      @keyframes pulseG5 { 0%, 100% { filter: drop-shadow(0 0 5px #9b5de5); } 50% { filter: drop-shadow(0 0 2px #9b5de5); } }
      @keyframes pulseG6 { 0%, 100% { filter: drop-shadow(0 0 5px #ff8c00); } 50% { filter: drop-shadow(0 0 2px #ff8c00); } }

      .bg { fill: #0a0014; }
      .bar-bg { fill: #0d001a; stroke: #1a0035; stroke-width: 1; rx: 4; }
      
      .title-font { font-family: 'Courier New', 'Consolas', monospace; font-size: 15px; font-weight: bold; }
      .desc-font { font-family: 'Courier New', 'Consolas', monospace; font-size: 14px; fill: #e0d0ff; }
      .icon-font { font-family: 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif; font-size: 26px; }
      
      .anim-1 { animation: slideIn 0.6s ease-out 0.1s both; }
      .anim-2 { animation: slideIn 0.6s ease-out 0.2s both; }
      .anim-3 { animation: slideIn 0.6s ease-out 0.3s both; }
      .anim-4 { animation: slideIn 0.6s ease-out 0.4s both; }
      .anim-5 { animation: slideIn 0.6s ease-out 0.5s both; }
      .anim-6 { animation: slideIn 0.6s ease-out 0.6s both; }
    </style>
  </defs>

  <rect width="900" height="520" class="bg" />

  <!-- Principle 1 -->
  <g class="anim-1">
    <rect x="20" y="20" width="860" height="60" class="bar-bg" />
    <rect x="20" y="20" width="6" height="60" fill="#ff2079" style="animation: pulseG1 3s infinite;" rx="2" />
    <text x="50" y="60" class="icon-font">🔨</text>
    <text x="100" y="55" class="title-font" fill="#ff2079">How I learn</text>
    <line x1="330" y1="50" x2="350" y2="50" stroke="#ff2079" stroke-width="2" />
    <text x="375" y="55" class="desc-font">Hands-on first. Build before reading.</text>
  </g>

  <!-- Principle 2 -->
  <g class="anim-2">
    <rect x="20" y="100" width="860" height="60" class="bar-bg" />
    <rect x="20" y="100" width="6" height="60" fill="#00fff1" style="animation: pulseG2 3s infinite;" rx="2" />
    <text x="50" y="140" class="icon-font">🧩</text>
    <text x="100" y="135" class="title-font" fill="#00fff1">How I solve problems</text>
    <line x1="330" y1="130" x2="350" y2="130" stroke="#00fff1" stroke-width="2" />
    <text x="375" y="135" class="desc-font">Trace the full system — firmware to mobile.</text>
  </g>

  <!-- Principle 3 -->
  <g class="anim-3">
    <rect x="20" y="180" width="860" height="60" class="bar-bg" />
    <rect x="20" y="180" width="6" height="60" fill="#f5f720" style="animation: pulseG3 3s infinite;" rx="2" />
    <text x="50" y="220" class="icon-font">🔁</text>
    <text x="100" y="215" class="title-font" fill="#f5f720">How I build</text>
    <line x1="330" y1="210" x2="350" y2="210" stroke="#f5f720" stroke-width="2" />
    <text x="375" y="215" class="desc-font">Ship a working version. Iterate. Improve.</text>
  </g>

  <!-- Principle 4 -->
  <g class="anim-4">
    <rect x="20" y="260" width="860" height="60" class="bar-bg" />
    <rect x="20" y="260" width="6" height="60" fill="#00ff41" style="animation: pulseG4 3s infinite;" rx="2" />
    <text x="50" y="300" class="icon-font">📄</text>
    <text x="100" y="295" class="title-font" fill="#00ff41">How I document</text>
    <line x1="330" y1="290" x2="350" y2="290" stroke="#00ff41" stroke-width="2" />
    <text x="375" y="295" class="desc-font">Every API gets a Postman coll + OpenAPI spec.</text>
  </g>

  <!-- Principle 5 -->
  <g class="anim-5">
    <rect x="20" y="340" width="860" height="60" class="bar-bg" />
    <rect x="20" y="340" width="6" height="60" fill="#9b5de5" style="animation: pulseG5 3s infinite;" rx="2" />
    <text x="50" y="380" class="icon-font">🤝</text>
    <text x="100" y="375" class="title-font" fill="#9b5de5">How I collaborate</text>
    <line x1="330" y1="370" x2="350" y2="370" stroke="#9b5de5" stroke-width="2" />
    <text x="375" y="375" class="desc-font">Contributor, not over-claimer. Team systems.</text>
  </g>

  <!-- Principle 6 -->
  <g class="anim-6">
    <rect x="20" y="420" width="860" height="60" class="bar-bg" />
    <rect x="20" y="420" width="6" height="60" fill="#ff8c00" style="animation: pulseG6 3s infinite;" rx="2" />
    <text x="50" y="460" class="icon-font">⚖️</text>
    <text x="100" y="455" class="title-font" fill="#ff8c00">What I value</text>
    <line x1="330" y1="450" x2="350" y2="450" stroke="#ff8c00" stroke-width="2" />
    <text x="375" y="455" class="desc-font">Working systems > perfect code. Clarity > clever.</text>
  </g>

</svg>
