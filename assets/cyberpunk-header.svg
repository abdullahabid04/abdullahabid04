<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <style>
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes glitch1 {
        0%, 100% { transform: translate(0, 0); }
        10% { transform: translate(-3px, -1px); }
        20% { transform: translate(3px, 1px); }
        30% { transform: translate(-2px, 2px); }
        40% { transform: translate(2px, -2px); }
        50% { transform: translate(-1px, 1px); }
        60% { transform: translate(1px, -1px); }
        70% { transform: translate(-3px, 0px); }
        80% { transform: translate(3px, 0px); }
        90% { transform: translate(0px, 2px); }
      }
      @keyframes glitch2 {
        0%, 100% { transform: translate(0, 0); opacity: 0.7; }
        15% { transform: translate(4px, 2px); opacity: 0.5; }
        25% { transform: translate(-4px, -1px); opacity: 0.8; }
        35% { transform: translate(2px, -3px); opacity: 0.4; }
        45% { transform: translate(-3px, 3px); opacity: 0.7; }
        55% { transform: translate(5px, -2px); opacity: 0.3; }
        65% { transform: translate(-2px, 1px); opacity: 0.6; }
        75% { transform: translate(3px, 3px); opacity: 0.5; }
        85% { transform: translate(-5px, -2px); opacity: 0.8; }
        95% { transform: translate(1px, 1px); opacity: 0.4; }
      }
      @keyframes glitch3 {
        0%, 100% { transform: translate(0, 0); opacity: 0.5; }
        12% { transform: translate(-5px, 1px); opacity: 0.3; }
        22% { transform: translate(5px, -2px); opacity: 0.6; }
        32% { transform: translate(-3px, 3px); opacity: 0.2; }
        42% { transform: translate(4px, -1px); opacity: 0.5; }
        52% { transform: translate(-2px, 2px); opacity: 0.7; }
        62% { transform: translate(3px, -3px); opacity: 0.4; }
        72% { transform: translate(-4px, 0px); opacity: 0.6; }
        82% { transform: translate(2px, 2px); opacity: 0.3; }
        92% { transform: translate(-1px, -1px); opacity: 0.5; }
      }
      @keyframes neonPulse {
        0%, 100% { filter: drop-shadow(0 0 8px #ff2079) drop-shadow(0 0 25px #ff2079) drop-shadow(0 0 50px #ff207980); }
        50% { filter: drop-shadow(0 0 4px #ff2079) drop-shadow(0 0 15px #ff2079) drop-shadow(0 0 30px #ff207940); }
      }
      @keyframes cyanPulse {
        0%, 100% { filter: drop-shadow(0 0 6px #00fff1) drop-shadow(0 0 20px #00fff1) drop-shadow(0 0 40px #00fff180); }
        50% { filter: drop-shadow(0 0 3px #00fff1) drop-shadow(0 0 10px #00fff1) drop-shadow(0 0 20px #00fff140); }
      }
      @keyframes scanline {
        0% { transform: translateY(-320px); }
        100% { transform: translateY(320px); }
      }
      @keyframes flicker {
        0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% { opacity: 1; }
        20%, 21.999%, 63%, 63.999%, 65%, 69.999% { opacity: 0.4; }
      }
      @keyframes subtitleSlideIn {
        0% { transform: translateX(-30px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes borderGlow {
        0%, 100% { stroke-opacity: 1; }
        50% { stroke-opacity: 0.3; }
      }
      @keyframes rotateWiggle {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(0.5deg); }
        75% { transform: rotate(-0.5deg); }
      }
      .bg { fill: #0a0014; }
      .bg-grid line { stroke: #1a003080; stroke-width: 0.5; }
      .main-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 72px;
        font-weight: bold;
        fill: #ffffff;
        animation: fadeIn 1.5s ease-out, neonPulse 3s ease-in-out infinite, flicker 8s linear infinite;
      }
      .glitch-red {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 72px;
        font-weight: bold;
        fill: #ff2079;
        animation: glitch2 0.3s infinite linear;
      }
      .glitch-cyan {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 72px;
        font-weight: bold;
        fill: #00fff1;
        animation: glitch3 0.4s infinite linear;
      }
      .subtitle {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 20px;
        fill: #00fff1;
        animation: fadeIn 2s ease-out 0.5s both, cyanPulse 4s ease-in-out infinite, subtitleSlideIn 1.5s ease-out 0.5s both;
      }
      .bracket {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 20px;
        fill: #ff2079;
        animation: fadeIn 2.5s ease-out 1s both, flicker 5s linear infinite;
      }
      .scanline-bar {
        fill: url(#scanGrad);
        animation: scanline 4s linear infinite;
      }
      .corner-accent { 
        stroke: #ff2079; 
        fill: none; 
        stroke-width: 2; 
        animation: borderGlow 2s ease-in-out infinite;
      }
      .corner-accent-cyan { 
        stroke: #00fff1; 
        fill: none; 
        stroke-width: 2; 
        animation: borderGlow 2s ease-in-out infinite 1s;
      }
      .decorator-line {
        stroke: #9b5de5;
        stroke-width: 1;
        animation: fadeIn 3s ease-out 1.5s both;
      }
      .hex-dot {
        fill: #ff2079;
        animation: flicker 3s linear infinite;
      }
      .hex-dot-cyan {
        fill: #00fff1;
        animation: flicker 4s linear infinite 0.5s;
      }
      .status-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 11px;
        fill: #00ff41;
        animation: fadeIn 3s ease-out 2s both, flicker 6s linear infinite;
      }
      .version-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 10px;
        fill: #9b5de580;
        animation: fadeIn 4s ease-out 2.5s both;
      }
      .rotating-element {
        animation: rotateWiggle 6s ease-in-out infinite;
        transform-origin: center;
      }
    </style>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00fff1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00fff1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00fff1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="30%" stop-color="#0d0020"/>
      <stop offset="60%" stop-color="#1a0033"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="1200" height="320"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  
  <!-- Grid Pattern -->
  <g opacity="0.15">
    <line x1="0" y1="40" x2="1200" y2="40" stroke="#1a0050" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#1a0050" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#1a0050" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#1a0050" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#1a0050" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#1a0050" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke="#1a0050" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="320" stroke="#1a0050" stroke-width="0.3"/>
    <line x1="200" y1="0" x2="200" y2="320" stroke="#1a0050" stroke-width="0.3"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke="#1a0050" stroke-width="0.3"/>
    <line x1="400" y1="0" x2="400" y2="320" stroke="#1a0050" stroke-width="0.3"/>
    <line x1="500" y1="0" x2="500" y2="320" stroke="#1a0050" stroke-width="0.3"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#1a0050" stroke-width="0.3"/>
    <line x1="700" y1="0" x2="700" y2="320" stroke="#1a0050" stroke-width="0.3"/>
    <line x1="800" y1="0" x2="800" y2="320" stroke="#1a0050" stroke-width="0.3"/>
    <line x1="900" y1="0" x2="900" y2="320" stroke="#1a0050" stroke-width="0.3"/>
    <line x1="1000" y1="0" x2="1000" y2="320" stroke="#1a0050" stroke-width="0.3"/>
    <line x1="1100" y1="0" x2="1100" y2="320" stroke="#1a0050" stroke-width="0.3"/>
  </g>

  <!-- Corner Accents -->
  <polyline points="0,40 0,0 40,0" class="corner-accent"/>
  <polyline points="1160,0 1200,0 1200,40" class="corner-accent-cyan"/>
  <polyline points="0,280 0,320 40,320" class="corner-accent-cyan"/>
  <polyline points="1160,320 1200,320 1200,280" class="corner-accent"/>
  
  <!-- Decorative dots -->
  <circle cx="55" cy="15" r="2" class="hex-dot"/>
  <circle cx="65" cy="15" r="2" class="hex-dot-cyan"/>
  <circle cx="75" cy="15" r="2" class="hex-dot"/>
  <circle cx="1125" cy="305" r="2" class="hex-dot"/>
  <circle cx="1135" cy="305" r="2" class="hex-dot-cyan"/>
  <circle cx="1145" cy="305" r="2" class="hex-dot"/>

  <!-- Decorator lines -->
  <line x1="100" y1="100" x2="350" y2="100" class="decorator-line"/>
  <line x1="850" y1="100" x2="1100" y2="100" class="decorator-line"/>
  <line x1="100" y1="230" x2="350" y2="230" class="decorator-line"/>
  <line x1="850" y1="230" x2="1100" y2="230" class="decorator-line"/>

  <!-- Glitch Layer - Red Channel -->
  <text x="600" y="160" text-anchor="middle" class="glitch-red" clip-path="url(#clip)">ABDULLAH ABID</text>
  
  <!-- Glitch Layer - Cyan Channel -->
  <text x="600" y="160" text-anchor="middle" class="glitch-cyan" clip-path="url(#clip)">ABDULLAH ABID</text>
  
  <!-- Main Name Text -->
  <text x="600" y="160" text-anchor="middle" class="main-text">ABDULLAH ABID</text>

  <!-- Subtitle -->
  <text x="600" y="200" text-anchor="middle" class="bracket">[</text>
  <text x="600" y="200" text-anchor="middle" class="subtitle">  Software Engineer  |  IoT Systems  |  SaaS Builder  </text>
  <text x="600" y="200" text-anchor="middle" class="bracket" dx="370">]</text>

  <!-- Status indicators -->
  <text x="50" y="300" class="status-text">SYS.STATUS: ONLINE</text>
  <text x="50" y="312" class="version-text">// v5.0 — 2020→PRESENT</text>
  <text x="1150" y="300" text-anchor="end" class="status-text">LOCATION: PKᐧBAHAWALPUR</text>
  <text x="1150" y="312" text-anchor="end" class="version-text">// COSMOS_ALGOS::FOUNDER</text>

  <!-- Scanline Effect -->
  <rect x="0" y="0" width="1200" height="60" class="scanline-bar" clip-path="url(#clip)"/>
</svg>
