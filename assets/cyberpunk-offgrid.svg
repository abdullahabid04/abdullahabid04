<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <style>
      @keyframes floatEffect {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      @keyframes scanline {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .bg { fill: #0a0014; }
      
      .hex-bg {
        fill: #0f0020;
        stroke: #1a0035;
        stroke-width: 1.5;
        transition: all 0.3s ease;
      }
      
      .title-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 13px;
        font-weight: bold;
        text-anchor: middle;
      }
      
      .desc-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 11px;
        fill: #c0b0e0;
        text-anchor: middle;
      }

      .icon-text {
        font-family: 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif;
        font-size: 32px;
        text-anchor: middle;
        dominant-baseline: middle;
        filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
      }
      
      .accent-line {
        stroke-width: 2;
        fill: none;
      }

      .f-1 { animation: floatEffect 4s ease-in-out infinite; }
      .f-2 { animation: floatEffect 4s ease-in-out infinite 0.6s; }
      .f-3 { animation: floatEffect 4s ease-in-out infinite 1.2s; }
      .f-4 { animation: floatEffect 4s ease-in-out infinite 1.8s; }
      .f-5 { animation: floatEffect 4s ease-in-out infinite 2.4s; }
      .f-6 { animation: floatEffect 4s ease-in-out infinite 3.0s; }
      
      .glitch-bar {
        fill: url(#scanGrad);
        opacity: 0.1;
        animation: scanline 3s linear infinite;
      }
    </style>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#00fff1"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <rect width="900" height="280" class="bg" />
  
  <rect x="20" y="20" width="860" height="240" rx="8" fill="#0d001a" stroke="#150025" stroke-width="1"/>
  <rect x="20" y="20" width="860" height="240" class="glitch-bar" />

  <!-- Item 1: Chess -->
  <g class="f-1" transform="translate(45, 50)">
    <rect width="120" height="150" rx="8" class="hex-bg" />
    <path d="M 0 15 L 0 8 Q 0 0 8 0 L 15 0" class="accent-line" stroke="#ff2079" />
    <text x="60" y="50" class="icon-text">♟️</text>
    <text x="60" y="90" class="title-text" fill="#ff2079">Chess</text>
    <text x="60" y="115" class="desc-text">Pattern</text>
    <text x="60" y="130" class="desc-text">recognition</text>
  </g>

  <!-- Item 2: Table Tennis -->
  <g class="f-2" transform="translate(185, 50)">
    <rect width="120" height="150" rx="8" class="hex-bg" />
    <path d="M 0 15 L 0 8 Q 0 0 8 0 L 15 0" class="accent-line" stroke="#00fff1" />
    <text x="60" y="50" class="icon-text">🏓</text>
    <text x="60" y="90" class="title-text" fill="#00fff1">Ping Pong</text>
    <text x="60" y="115" class="desc-text">Fast decisions,</text>
    <text x="60" y="130" class="desc-text">compete mindset</text>
  </g>

  <!-- Item 3: Cars & PCs -->
  <g class="f-3" transform="translate(325, 50)">
    <rect width="120" height="150" rx="8" class="hex-bg" />
    <path d="M 0 15 L 0 8 Q 0 0 8 0 L 15 0" class="accent-line" stroke="#f5f720" />
    <text x="60" y="50" class="icon-text">⚙️</text>
    <text x="60" y="90" class="title-text" fill="#f5f720">Cars &amp; PCs</text>
    <text x="60" y="115" class="desc-text">How systems &amp;</text>
    <text x="60" y="130" class="desc-text">parts interact</text>
  </g>

  <!-- Item 4: History -->
  <g class="f-4" transform="translate(465, 50)">
    <rect width="120" height="150" rx="8" class="hex-bg" />
    <path d="M 0 15 L 0 8 Q 0 0 8 0 L 15 0" class="accent-line" stroke="#9b5de5" />
    <text x="60" y="50" class="icon-text">🏛️</text>
    <text x="60" y="90" class="title-text" fill="#9b5de5">History</text>
    <text x="60" y="115" class="desc-text">Long-term thinking,</text>
    <text x="60" y="130" class="desc-text">cause &amp; effect</text>
  </g>

  <!-- Item 5: AI Trends -->
  <g class="f-5" transform="translate(605, 50)">
    <rect width="120" height="150" rx="8" class="hex-bg" />
    <path d="M 0 15 L 0 8 Q 0 0 8 0 L 15 0" class="accent-line" stroke="#00ff41" />
    <text x="60" y="50" class="icon-text">🤖</text>
    <text x="60" y="90" class="title-text" fill="#00ff41">AI Trends</text>
    <text x="60" y="115" class="desc-text">Stays current,</text>
    <text x="60" y="130" class="desc-text">builds with it</text>
  </g>

  <!-- Item 6: Travel -->
  <g class="f-6" transform="translate(745, 50)">
    <rect width="120" height="150" rx="8" class="hex-bg" />
    <path d="M 0 15 L 0 8 Q 0 0 8 0 L 15 0" class="accent-line" stroke="#ff8c00" />
    <text x="60" y="50" class="icon-text">🌿</text>
    <text x="60" y="90" class="title-text" fill="#ff8c00">Travel</text>
    <text x="60" y="115" class="desc-text">Perspective</text>
    <text x="60" y="130" class="desc-text">outside screens</text>
  </g>

</svg>
