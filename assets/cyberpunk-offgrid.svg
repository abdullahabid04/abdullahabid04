<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="900" height="350">
  <defs>
    <style>
      @keyframes floatSlide {
        0% { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      .bg { fill: #0a0014; }
      
      .box {
        fill: #0d001a;
        stroke: #1a0035;
        stroke-width: 1.5;
        rx: 6;
      }
      
      .title-font { font-family: 'Courier New', 'Consolas', monospace; font-size: 15px; font-weight: bold; text-anchor: middle; }
      .desc-font { font-family: 'Courier New', 'Consolas', monospace; font-size: 12px; fill: #c0b0e0; text-anchor: middle; }
      .icon-font { font-family: 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif; font-size: 32px; text-anchor: middle; }

      .anim-1 { animation: floatSlide 0.5s ease-out 0.1s both; }
      .anim-2 { animation: floatSlide 0.5s ease-out 0.2s both; }
      .anim-3 { animation: floatSlide 0.5s ease-out 0.3s both; }
      .anim-4 { animation: floatSlide 0.5s ease-out 0.4s both; }
      .anim-5 { animation: floatSlide 0.5s ease-out 0.5s both; }
      .anim-6 { animation: floatSlide 0.5s ease-out 0.6s both; }
    </style>
  </defs>

  <rect width="900" height="350" class="bg" />

  <!-- Item 1: Chess -->
  <g class="anim-1">
    <rect x="30" y="20" width="260" height="130" class="box" />
    <path d="M 30 40 L 30 26 Q 30 20 36 20 L 50 20" stroke="#ff2079" stroke-width="2" fill="none" />
    <text x="160" y="55" class="icon-font">♟️</text>
    <text x="160" y="85" class="title-font" fill="#ff2079">Chess</text>
    <text x="160" y="110" class="desc-font">Pattern recognition</text>
    <text x="160" y="128" class="desc-font">under pressure</text>
  </g>

  <!-- Item 2: Table Tennis -->
  <g class="anim-2">
    <rect x="320" y="20" width="260" height="130" class="box" />
    <path d="M 320 40 L 320 26 Q 320 20 326 20 L 340 20" stroke="#00fff1" stroke-width="2" fill="none" />
    <text x="450" y="55" class="icon-font">🏓</text>
    <text x="450" y="85" class="title-font" fill="#00fff1">Ping Pong</text>
    <text x="450" y="110" class="desc-font">Fast decisions,</text>
    <text x="450" y="128" class="desc-font">competitive mindset</text>
  </g>

  <!-- Item 3: Cars & PCs -->
  <g class="anim-3">
    <rect x="610" y="20" width="260" height="130" class="box" />
    <path d="M 610 40 L 610 26 Q 610 20 616 20 L 630 20" stroke="#f5f720" stroke-width="2" fill="none" />
    <text x="740" y="55" class="icon-font">⚙️</text>
    <text x="740" y="85" class="title-font" fill="#f5f720">Cars &amp; PCs</text>
    <text x="740" y="110" class="desc-font">How systems and</text>
    <text x="740" y="128" class="desc-font">components interact</text>
  </g>

  <!-- Item 4: History -->
  <g class="anim-4">
    <rect x="30" y="180" width="260" height="130" class="box" />
    <path d="M 30 200 L 30 186 Q 30 180 36 180 L 50 180" stroke="#9b5de5" stroke-width="2" fill="none" />
    <text x="160" y="215" class="icon-font">🏛️</text>
    <text x="160" y="245" class="title-font" fill="#9b5de5">History</text>
    <text x="160" y="270" class="desc-font">Long-term thinking,</text>
    <text x="160" y="288" class="desc-font">cause and effect at scale</text>
  </g>

  <!-- Item 5: AI Trends -->
  <g class="anim-5">
    <rect x="320" y="180" width="260" height="130" class="box" />
    <path d="M 320 200 L 320 186 Q 320 180 326 180 L 340 180" stroke="#00ff41" stroke-width="2" fill="none" />
    <text x="450" y="215" class="icon-font">🤖</text>
    <text x="450" y="245" class="title-font" fill="#00ff41">AI Trends</text>
    <text x="450" y="270" class="desc-font">Stays current,</text>
    <text x="450" y="288" class="desc-font">builds with it</text>
  </g>

  <!-- Item 6: Travel -->
  <g class="anim-6">
    <rect x="610" y="180" width="260" height="130" class="box" />
    <path d="M 610 200 L 610 186 Q 610 180 616 180 L 630 180" stroke="#ff8c00" stroke-width="2" fill="none" />
    <text x="740" y="215" class="icon-font">🌿</text>
    <text x="740" y="245" class="title-font" fill="#ff8c00">Travel</text>
    <text x="740" y="270" class="desc-font">Perspective</text>
    <text x="740" y="288" class="desc-font">outside screens</text>
  </g>

</svg>
