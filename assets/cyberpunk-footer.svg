<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="1200" height="160">
  <defs>
    <style>
      @keyframes fadeBreath {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      @keyframes glitchFooter1 {
        0%, 100% { transform: translate(0, 0); }
        10% { transform: translate(-2px, -1px); }
        20% { transform: translate(2px, 1px); }
        30% { transform: translate(-1px, 2px); }
        40% { transform: translate(1px, -1px); }
        50% { transform: translate(-2px, 0px); }
        60% { transform: translate(2px, 0px); }
        70% { transform: translate(0px, 1px); }
        80% { transform: translate(-1px, -2px); }
        90% { transform: translate(1px, 1px); }
      }
      @keyframes glitchFooter2 {
        0%, 100% { transform: translate(0, 0); opacity: 0.5; }
        15% { transform: translate(3px, 1px); opacity: 0.3; }
        25% { transform: translate(-3px, -1px); opacity: 0.6; }
        35% { transform: translate(2px, -2px); opacity: 0.2; }
        45% { transform: translate(-2px, 2px); opacity: 0.5; }
        55% { transform: translate(4px, -1px); opacity: 0.3; }
        65% { transform: translate(-1px, 1px); opacity: 0.4; }
        75% { transform: translate(2px, 2px); opacity: 0.6; }
        85% { transform: translate(-3px, -1px); opacity: 0.2; }
        95% { transform: translate(1px, 0px); opacity: 0.5; }
      }
      @keyframes gridFade {
        0%, 100% { opacity: 0.08; }
        50% { opacity: 0.2; }
      }
      @keyframes terminalBlink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes sweepLine {
        0% { transform: translateX(-1200px); }
        100% { transform: translateX(1200px); }
      }
      @keyframes neonFlicker {
        0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% { opacity: 0.9; }
        20%, 21.999%, 63%, 63.999%, 65%, 69.999% { opacity: 0.3; }
      }
      @keyframes pulseText {
        0%, 100% { filter: drop-shadow(0 0 5px #ff2079) drop-shadow(0 0 15px #ff2079); }
        50% { filter: drop-shadow(0 0 2px #ff2079) drop-shadow(0 0 8px #ff2079); }
      }
      .footer-bg {
        fill: url(#footerGrad);
      }
      .grid-line {
        stroke: #1a0050;
        stroke-width: 0.5;
        animation: gridFade 5s ease-in-out infinite;
      }
      .grid-line-v {
        stroke: #1a0050;
        stroke-width: 0.3;
        animation: gridFade 5s ease-in-out infinite 2.5s;
      }
      .main-footer-text {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 28px;
        font-weight: bold;
        fill: #ffffff;
        animation: neonFlicker 8s linear infinite, pulseText 3s ease-in-out infinite;
      }
      .glitch-red-f {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 28px;
        font-weight: bold;
        fill: #ff2079;
        animation: glitchFooter2 0.35s infinite linear;
      }
      .glitch-cyan-f {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 28px;
        font-weight: bold;
        fill: #00fff1;
        animation: glitchFooter1 0.4s infinite linear;
        opacity: 0.5;
      }
      .sub-footer {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 12px;
        fill: #9b5de5;
        animation: fadeBreath 4s ease-in-out infinite;
      }
      .cursor-blink {
        fill: #00ff41;
        animation: terminalBlink 1s step-end infinite;
      }
      .sweep {
        fill: url(#sweepGrad);
        animation: sweepLine 5s linear infinite;
      }
      .corner-fl {
        stroke: #00fff1;
        fill: none;
        stroke-width: 1.5;
        animation: neonFlicker 6s linear infinite;
      }
      .corner-fr {
        stroke: #ff2079;
        fill: none;
        stroke-width: 1.5;
        animation: neonFlicker 6s linear infinite 3s;
      }
      .status-f {
        font-family: 'Courier New', 'Consolas', monospace;
        font-size: 10px;
        fill: #00ff41;
        opacity: 0.6;
        animation: fadeBreath 3s ease-in-out infinite 1s;
      }
    </style>
    <linearGradient id="footerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0014" stop-opacity="0"/>
      <stop offset="30%" stop-color="#0a0014"/>
      <stop offset="100%" stop-color="#0d0020"/>
    </linearGradient>
    <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00fff1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00fff1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00fff1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="160" class="footer-bg"/>
  
  <!-- Perspective Grid -->
  <g>
    <line x1="0" y1="40" x2="1200" y2="40" class="grid-line"/>
    <line x1="0" y1="60" x2="1200" y2="60" class="grid-line"/>
    <line x1="0" y1="80" x2="1200" y2="80" class="grid-line"/>
    <line x1="0" y1="100" x2="1200" y2="100" class="grid-line"/>
    <line x1="0" y1="120" x2="1200" y2="120" class="grid-line"/>
    <line x1="0" y1="140" x2="1200" y2="140" class="grid-line"/>
    <line x1="100" y1="20" x2="100" y2="160" class="grid-line-v"/>
    <line x1="250" y1="20" x2="250" y2="160" class="grid-line-v"/>
    <line x1="400" y1="20" x2="400" y2="160" class="grid-line-v"/>
    <line x1="550" y1="20" x2="550" y2="160" class="grid-line-v"/>
    <line x1="650" y1="20" x2="650" y2="160" class="grid-line-v"/>
    <line x1="800" y1="20" x2="800" y2="160" class="grid-line-v"/>
    <line x1="950" y1="20" x2="950" y2="160" class="grid-line-v"/>
    <line x1="1100" y1="20" x2="1100" y2="160" class="grid-line-v"/>
  </g>

  <!-- Corner frames -->
  <polyline points="20,30 20,20 30,20" class="corner-fl"/>
  <polyline points="1170,20 1180,20 1180,30" class="corner-fr"/>
  <polyline points="20,140 20,150 30,150" class="corner-fr"/>
  <polyline points="1170,150 1180,150 1180,140" class="corner-fl"/>

  <!-- Glitch text layers -->
  <text x="600" y="85" text-anchor="middle" class="glitch-red-f">// CONNECTION TERMINATED</text>
  <text x="600" y="85" text-anchor="middle" class="glitch-cyan-f">// CONNECTION TERMINATED</text>
  <text x="600" y="85" text-anchor="middle" class="main-footer-text">// CONNECTION TERMINATED</text>
  
  <!-- Subtitle -->
  <text x="600" y="110" text-anchor="middle" class="sub-footer">SIGNAL ENCRYPTED  ·  AWAITING RECONNECTION  ·  UPLINK AVAILABLE</text>
  
  <!-- Blinking cursor -->
  <rect x="790" y="96" width="8" height="14" class="cursor-blink"/>
  
  <!-- Status text -->
  <text x="40" y="150" class="status-f">[EOF] SESSION_ID: 0xABD04</text>
  <text x="1160" y="150" text-anchor="end" class="status-f">COSMOS_ALGOS.NET // SECURED</text>

  <!-- Sweep effect -->
  <rect x="0" y="0" width="200" height="160" class="sweep"/>
</svg>
